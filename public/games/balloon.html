<!DOCTYPE html>
<html>
<head>
  <title>Balloon Therapy – Stroke Rehab</title>

  <!-- ✅ Use MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      overflow:hidden;
    }

    h2{
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
    }

    video{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      transform: scaleX(-1);
    }

    canvas{
      position:absolute;
      transform: scaleX(-1);
    }

    #score{
      position:absolute;
      top:10px;
      left:20px;
      font-size:22px;
    }

    #timer{
      position:absolute;
      top:10px;
      right:20px;
      font-size:22px;
    }
  </style>
</head>

<body>

<h2>Balloon Therapy – Stroke Rehabilitation</h2>
<div id="score">Score: 0</div>
<div id="timer">Time: 60</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* 🎈 Load balloon image */
let balloonImg = new Image();
balloonImg.src = "ballon.png";

/* ---------- GAME ---------- */

let balloons = [];
let score = 0;
let time = 60;

function createBalloon() {
  balloons.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 90
  });
}

for (let i = 0; i < 6; i++) createBalloon();

function drawBalloons() {
  balloons.forEach(b => {
    ctx.drawImage(balloonImg, b.x, b.y, b.size, b.size);
  });
}

/* Timer */
setInterval(() => {
  time--;
  document.getElementById("timer").innerText = "Time: " + time;

  if (time <= 0) {
    alert("Session Complete! Score: " + score);
    location.reload();
  }
}, 1000);

/* ---------- MEDIAPIPE ---------- */

const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0, // faster
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});

hands.onResults(results => {

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBalloons();

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

    const hand = results.multiHandLandmarks[0];
    const indexFinger = hand[8];

    const x = indexFinger.x * canvas.width;
    const y = indexFinger.y * canvas.height;

    /* 🔴 Finger pointer */
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, 2 * Math.PI);
    ctx.fillStyle = "red";
    ctx.fill();

    /* 💥 Collision */
    balloons.forEach((b, i) => {
      if (
        x > b.x &&
        x < b.x + b.size &&
        y > b.y &&
        y < b.y + b.size
      ) {
        balloons.splice(i, 1);
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        createBalloon();
      }
    });
  }
});

/* ---------- CAMERA ---------- */

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 1280,
  height: 720
});

camera.start();
</script>

</body>
</html>
